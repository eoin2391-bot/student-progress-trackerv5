<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <meta name="description" content="Track student progress and collaboration behaviors">
    <title>Student Progress Tracker</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;

        // Lucide React icons as inline SVG components
        const Plus = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );

        const User = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        );

        const CheckCircle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );

        const Circle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle>
            </svg>
        );

        const Edit2 = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
            </svg>
        );

        const Trash2 = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
        );

        const Save = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
        );

        const X = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        );

        const Users = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
        );

        const Star = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
        );

        const TeacherProgressTracker = () => {
            const [tasks, setTasks] = useState([
                { 
                    id: 1, 
                    name: 'Agents of Learning', 
                    description: '',
                    observationElements: [
                        { name: 'Respectful Ruby', descriptor: 'Respect & Kindness' },
                        { name: 'Reliable Remy', descriptor: 'Responsibility & Self-Management' },
                        { name: 'Teamwork Tara', descriptor: 'Collaboration & Communication' },
                        { name: 'Skilful Suki', descriptor: 'Practice & Craftsmanship' },
                        { name: 'Independent Imara', descriptor: 'Self Discipline & Initiative' },
                        { name: 'Creative Casey', descriptor: 'Imagination & Innovation' },
                        { name: 'Thinking Thelma', descriptor: 'Reflection & Deep Thinking' },
                        { name: 'Motivated Macy', descriptor: 'Goals & Motivation' },
                        { name: 'Determined Daisy', descriptor: 'Effort & Grit' },
                        { name: 'Feedback Freya', descriptor: 'Growth Mindset & Improvement' }
                    ]
                },
                { 
                    id: 2, 
                    name: 'Agents of Learning', 
                    description: '',
                    observationElements: [
                        { name: 'Respectful Ruby', descriptor: 'Respect & Kindness' },
                        { name: 'Reliable Remy', descriptor: 'Responsibility & Self-Management' },
                        { name: 'Teamwork Tara', descriptor: 'Collaboration & Communication' },
                        { name: 'Skilful Suki', descriptor: 'Practice & Craftsmanship' },
                        { name: 'Independent Imara', descriptor: 'Self Discipline & Initiative' },
                        { name: 'Creative Casey', descriptor: 'Imagination & Innovation' },
                        { name: 'Thinking Thelma', descriptor: 'Reflection & Deep Thinking' },
                        { name: 'Motivated Macy', descriptor: 'Goals & Motivation' },
                        { name: 'Determined Daisy', descriptor: 'Effort & Grit' },
                        { name: 'Feedback Freya', descriptor: 'Growth Mindset & Improvement' }
                    ]
                },
                { 
                    id: 3, 
                    name: 'Agents of Learning', 
                    description: '',
                    observationElements: [
                        { name: 'Respectful Ruby', descriptor: 'Respect & Kindness' },
                        { name: 'Reliable Remy', descriptor: 'Responsibility & Self-Management' },
                        { name: 'Teamwork Tara', descriptor: 'Collaboration & Communication' },
                        { name: 'Skilful Suki', descriptor: 'Practice & Craftsmanship' },
                        { name: 'Independent Imara', descriptor: 'Self Discipline & Initiative' },
                        { name: 'Creative Casey', descriptor: 'Imagination & Innovation' },
                        { name: 'Thinking Thelma', descriptor: 'Reflection & Deep Thinking' },
                        { name: 'Motivated Macy', descriptor: 'Goals & Motivation' },
                        { name: 'Determined Daisy', descriptor: 'Effort & Grit' },
                        { name: 'Feedback Freya', descriptor: 'Growth Mindset & Improvement' }
                    ]
                }
            ]);

            const [students, setStudents] = useState([
                { id: 1, name: 'Alice Johnson', progress: { 1: true, 2: false, 3: true } },
                { id: 2, name: 'Bob Smith', progress: { 1: true, 2: true, 3: false } },
                { id: 3, name: 'Carol Davis', progress: { 1: false, 2: true, 3: true } },
                { id: 4, name: 'David Wilson', progress: { 1: true, 2: false, 3: false } }
            ]);

            const [studentObservations, setStudentObservations] = useState({});
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [selectedTaskForObservation, setSelectedTaskForObservation] = useState(null);
            const [isAddingTask, setIsAddingTask] = useState(false);
            const [isAddingStudent, setIsAddingStudent] = useState(false);
            const [newTaskName, setNewTaskName] = useState('');
            const [newTaskDescription, setNewTaskDescription] = useState('');
            const [newTaskElements, setNewTaskElements] = useState([{ name: '', descriptor: '' }]);
            const [newStudentName, setNewStudentName] = useState('');
            const [editingTask, setEditingTask] = useState(null);

            const addObservationElement = () => {
                setNewTaskElements([...newTaskElements, { name: '', descriptor: '' }]);
            };

            const updateObservationElement = (index, field, value) => {
                const updated = [...newTaskElements];
                updated[index][field] = value;
                setNewTaskElements(updated);
            };

            const removeObservationElement = (index) => {
                setNewTaskElements(newTaskElements.filter((_, i) => i !== index));
            };

            const addTask = () => {
                if (newTaskName.trim()) {
                    const newTask = {
                        id: Math.max(...tasks.map(t => t.id), 0) + 1,
                        name: newTaskName,
                        description: newTaskDescription,
                        observationElements: newTaskElements.filter(el => el.name.trim() !== '')
                    };
                    setTasks([...tasks, newTask]);
                    
                    setStudents(students.map(student => ({
                        ...student,
                        progress: { ...student.progress, [newTask.id]: false }
                    })));
                    
                    setNewTaskName('');
                    setNewTaskDescription('');
                    setNewTaskElements([{ name: '', descriptor: '' }]);
                    setIsAddingTask(false);
                }
            };

            const addStudent = () => {
                if (newStudentName.trim()) {
                    const newStudent = {
                        id: Math.max(...students.map(s => s.id), 0) + 1,
                        name: newStudentName,
                        progress: Object.fromEntries(tasks.map(task => [task.id, false]))
                    };
                    setStudents([...students, newStudent]);
                    setNewStudentName('');
                    setIsAddingStudent(false);
                }
            };

            const toggleProgress = (studentId, taskId) => {
                setStudents(students.map(student => 
                    student.id === studentId 
                        ? { 
                            ...student, 
                            progress: { 
                                ...student.progress, 
                                [taskId]: !student.progress[taskId] 
                            }
                        }
                        : student
                ));
            };

            const toggleStudentObservation = (studentId, taskId, elementIndex) => {
                setStudentObservations(prev => ({
                    ...prev,
                    [studentId]: {
                        ...prev[studentId],
                        [taskId]: {
                            ...prev[studentId]?.[taskId],
                            [elementIndex]: !prev[studentId]?.[taskId]?.[elementIndex]
                        }
                    }
                }));
            };

            const deleteTask = (taskId) => {
                setTasks(tasks.filter(task => task.id !== taskId));
                setStudents(students.map(student => {
                    const newProgress = { ...student.progress };
                    delete newProgress[taskId];
                    return { ...student, progress: newProgress };
                }));
                const newObservations = { ...studentObservations };
                Object.keys(newObservations).forEach(studentId => {
                    if (newObservations[studentId][taskId]) {
                        delete newObservations[studentId][taskId];
                    }
                });
                setStudentObservations(newObservations);
            };

            const editTask = (taskId, newName, newDescription) => {
                setTasks(tasks.map(task => 
                    task.id === taskId 
                        ? { ...task, name: newName, description: newDescription }
                        : task
                ));
                setEditingTask(null);
            };

            const getCompletionPercentage = (student) => {
                const completed = Object.values(student.progress).filter(Boolean).length;
                return tasks.length > 0 ? Math.round((completed / tasks.length) * 100) : 0;
            };

            const getTaskCompletionCount = (taskId) => {
                return students.filter(student => student.progress[taskId]).length;
            };

            const getStudentObservationValue = (studentId, taskId, elementIndex) => {
                return studentObservations[studentId]?.[taskId]?.[elementIndex] || false;
            };

            const getObservationProgress = (studentId) => {
                const studentObs = studentObservations[studentId] || {};
                let totalElements = 0;
                let completedElements = 0;

                tasks.forEach(task => {
                    if (task.observationElements) {
                        totalElements += task.observationElements.length;
                        task.observationElements.forEach((_, elementIndex) => {
                            if (studentObs[task.id]?.[elementIndex]) {
                                completedElements++;
                            }
                        });
                    }
                });

                return totalElements > 0 ? Math.round((completedElements / totalElements) * 100) : 0;
            };

            const getStudentObservationDetails = (studentId) => {
                const details = [];
                tasks.forEach(task => {
                    if (task.observationElements) {
                        task.observationElements.forEach((element, elementIndex) => {
                            const elementName = typeof element === 'object' ? element.name : element;
                            const elementDescriptor = typeof element === 'object' ? element.descriptor : '';
                            details.push({
                                taskName: task.name,
                                element: elementName,
                                descriptor: elementDescriptor,
                                completed: getStudentObservationValue(studentId, task.id, elementIndex),
                                taskId: task.id,
                                elementIndex: elementIndex
                            });
                        });
                    }
                });
                return details;
            };

            return (
                <div className="min-h-screen bg-gray-50 p-6">
                    <div className="max-w-7xl mx-auto">
                        <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                            <h1 className="text-3xl font-bold text-gray-800 mb-2">Student Progress Tracker</h1>
                            <p className="text-gray-600">Manage tasks, track completion, and observe individual student collaboration & learning behaviors</p>
                        </div>

                        <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-2xl font-semibold text-gray-800">Tasks</h2>
                                <button
                                    onClick={() => setIsAddingTask(true)}
                                    className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 flex items-center gap-2"
                                >
                                    <Plus size={20} />
                                    Add Task
                                </button>
                            </div>

                            {isAddingTask && (
                                <div className="bg-blue-50 p-4 rounded-lg mb-4">
                                    <input
                                        type="text"
                                        placeholder="Task name"
                                        value={newTaskName}
                                        onChange={(e) => setNewTaskName(e.target.value)}
                                        className="w-full p-2 border border-gray-300 rounded mb-2"
                                    />
                                    <input
                                        type="text"
                                        placeholder="Task description"
                                        value={newTaskDescription}
                                        onChange={(e) => setNewTaskDescription(e.target.value)}
                                        className="w-full p-2 border border-gray-300 rounded mb-3"
                                    />
                                    
                                    <div className="mb-3">
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Observation Elements (behaviors to track per student):
                                        </label>
                                        {newTaskElements.map((element, index) => (
                                            <div key={index} className="flex gap-2 mb-2">
                                                <input
                                                    type="text"
                                                    placeholder="e.g., Respectful Ruby"
                                                    value={element.name}
                                                    onChange={(e) => updateObservationElement(index, 'name', e.target.value)}
                                                    className="flex-1 p-2 border border-gray-300 rounded"
                                                />
                                                <input
                                                    type="text"
                                                    placeholder="e.g., Respect & Kindness"
                                                    value={element.descriptor}
                                                    onChange={(e) => updateObservationElement(index, 'descriptor', e.target.value)}
                                                    className="flex-1 p-2 border border-gray-300 rounded"
                                                />
                                                {newTaskElements.length > 1 && (
                                                    <button
                                                        onClick={() => removeObservationElement(index)}
                                                        className="px-3 py-2 bg-red-500 text-white rounded hover:bg-red-600"
                                                    >
                                                        <X size={16} />
                                                    </button>
                                                )}
                                            </div>
                                        ))}
                                        <button
                                            onClick={addObservationElement}
                                            className="text-blue-600 hover:text-blue-800 text-sm flex items-center gap-1"
                                        >
                                            <Plus size={16} />
                                            Add observation element
                                        </button>
                                    </div>

                                    <div className="flex gap-2">
                                        <button
                                            onClick={addTask}
                                            className="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 flex items-center gap-2"
                                        >
                                            <Save size={16} />
                                            Save
                                        </button>
                                        <button
                                            onClick={() => {
                                                setIsAddingTask(false);
                                                setNewTaskElements([{ name: '', descriptor: '' }]);
                                            }}
                                            className="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600 flex items-center gap-2"
                                        >
                                            <X size={16} />
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            )}

                            <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
                                {tasks.map(task => (
                                    <div key={task.id} className="bg-gradient-to-r from-blue-500 to-purple-600 rounded-lg p-4 text-white">
                                        {editingTask === task.id ? (
                                            <div>
                                                <input
                                                    type="text"
                                                    defaultValue={task.name}
                                                    className="w-full p-2 text-gray-800 rounded mb-2"
                                                    onKeyDown={(e) => {
                                                        if (e.key === 'Enter') {
                                                            editTask(task.id, e.target.value, task.description);
                                                        }
                                                    }}
                                                />
                                            </div>
                                        ) : (
                                            <>
                                                <div className="flex justify-between items-start mb-2">
                                                    <h3 className="text-lg font-semibold">{task.name}</h3>
                                                    <div className="flex gap-1">
                                                        <button
                                                            onClick={() => setEditingTask(task.id)}
                                                            className="text-white hover:text-gray-200"
                                                        >
                                                            <Edit2 size={16} />
                                                        </button>
                                                        <button
                                                            onClick={() => deleteTask(task.id)}
                                                            className="text-white hover:text-red-200"
                                                        >
                                                            <Trash2 size={16} />
                                                        </button>
                                                    </div>
                                                </div>
                                                {task.description && <p className="text-blue-100 text-sm mb-3">{task.description}</p>}
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className="bg-white bg-opacity-20 px-2 py-1 rounded text-sm">
                                                        {getTaskCompletionCount(task.id)}/{students.length} completed
                                                    </span>
                                                    <button
                                                        onClick={() => setSelectedTaskForObservation(
                                                            selectedTaskForObservation === task.id ? null : task.id
                                                        )}
                                                        className="bg-white bg-opacity-20 px-3 py-1 rounded text-sm hover:bg-opacity-30 flex items-center gap-1"
                                                    >
                                                        <Users size={16} />
                                                        {selectedTaskForObservation === task.id ? 'Hide' : 'Observe'}
                                                    </button>
                                                </div>
                                                
                                                {task.observationElements && task.observationElements.length > 0 && (
                                                    <div className="text-xs bg-white bg-opacity-10 p-2 rounded">
                                                        <strong>Tracking:</strong> {task.observationElements.map(el => typeof el === 'object' ? el.name : el).join(', ')}
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </div>
                                ))}
                            </div>

                            {selectedTaskForObservation && (
                                <div className="mt-6 bg-white border rounded-lg overflow-hidden">
                                    <div className="bg-gray-50 p-4 border-b">
                                        <h3 className="text-lg font-semibold text-gray-800 flex items-center gap-2">
                                            <Users size={20} />
                                            Student Observation: {tasks.find(t => t.id === selectedTaskForObservation)?.name}
                                            <span className="text-sm text-gray-600 font-normal ml-2">
                                                (Data is linked to individual student profiles)
                                            </span>
                                        </h3>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full">
                                            <thead className="bg-gray-100">
                                                <tr>
                                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700 w-48">Student</th>
                                                    {tasks.find(t => t.id === selectedTaskForObservation)?.observationElements?.map((element, index) => {
                                                        const isObject = typeof element === 'object';
                                                        const elementName = isObject ? element.name : element;
                                                        const descriptor = isObject ? element.descriptor : null;
                                                        
                                                        return (
                                                            <th key={index} className="px-4 py-3 text-center text-sm font-medium text-gray-700 min-w-52">
                                                                <div className="font-semibold">{elementName}</div>
                                                                {descriptor && (
                                                                    <div className="text-xs font-normal text-blue-600 mt-1 whitespace-normal leading-tight">
                                                                        {descriptor}
                                                                    </div>
                                                                )}
                                                            </th>
                                                        );
                                                    })}
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-200">
                                                {students.map(student => (
                                                    <tr key={student.id} className="hover:bg-gray-50">
                                                        <td className="px-4 py-3 text-sm font-medium text-gray-900">
                                                            {student.name}
                                                        </td>
                                                        {tasks.find(t => t.id === selectedTaskForObservation)?.observationElements?.map((_, elementIndex) => (
                                                            <td key={elementIndex} className="px-4 py-3 text-center">
                                                                <button
                                                                    onClick={() => toggleStudentObservation(student.id, selectedTaskForObservation, elementIndex)}
                                                                    className="inline-flex items-center justify-center w-8 h-8 rounded-full hover:bg-gray-100"
                                                                >
                                                                    {getStudentObservationValue(student.id, selectedTaskForObservation, elementIndex) ? (
                                                                        <CheckCircle size={20} className="text-green-600" />
                                                                    ) : (
                                                                        <Circle size={20} className="text-gray-400" />
                                                                    )}
                                                                </button>
                                                            </td>
                                                        ))}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="bg-white rounded-lg shadow-lg p-6">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-2xl font-semibold text-gray-800">Students</h2>
                                <button
                                    onClick={() => setIsAddingStudent(true)}
                                    className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 flex items-center gap-2"
                                >
                                    <Plus size={20} />
                                    Add Student
                                </button>
                            </div>

                            {isAddingStudent && (
                                <div className="bg-green-50 p-4 rounded-lg mb-4">
                                    <input
                                        type="text"
                                        placeholder="Student name"
                                        value={newStudentName}
                                        onChange={(e) => setNewStudentName(e.target.value)}
                                        className="w-full p-2 border border-gray-300 rounded mb-2"
                                    />
                                    <div className="flex gap-2">
                                        <button
                                            onClick={addStudent}
                                            className="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 flex items-center gap-2"
                                        >
                                            <Save size={16} />
                                            Save
                                        </button>
                                        <button
                                            onClick={() => setIsAddingStudent(false)}
                                            className="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600 flex items-center gap-2"
                                        >
                                            <X size={16} />
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                {students.map(student => (
                                    <div key={student.id} className="bg-gradient-to-r from-green-400 to-blue-500 rounded-lg p-4 text-white">
                                        <div className="flex items-center justify-between mb-3">
                                            <div className="flex items-center gap-2">
                                                <User size={20} />
                                                <h3 className="font-semibold">{student.name}</h3>
                                            </div>
                                            <button
                                                onClick={() => setSelectedStudent(selectedStudent === student.id ? null : student.id)}
                                                className="bg-white bg-opacity-20 px-3 py-1 rounded text-sm hover:bg-opacity-30"
                                            >
                                                {selectedStudent === student.id ? 'Hide' : 'Details'}
                                            </button>
                                        </div>
                                        
                                        <div className="mb-2">
                                            <p className="text-xs text-blue-100 mb-1 flex items-center gap-1">
                                                <Star size={12} />
                                                Collaboration & Behaviors
                                            </p>
                                            <div className="bg-white bg-opacity-20 rounded-full h-2 mb-1">
                                                <div 
                                                    className="bg-yellow-300 rounded-full h-2 transition-all duration-300"
                                                    style={{ width: `${getObservationProgress(student.id)}%` }}
                                                ></div>
                                            </div>
                                            <p className="text-sm mb-1">{getObservationProgress(student.id)}% Observed Positively</p>
                                            <div className="flex justify-between text-xs text-blue-200">
                                                <span>Developing</span>
                                                <span>Sound</span>
                                                <span>High</span>
                                                <span>Excellent</span>
                                            </div>
                                        </div>

                                        {selectedStudent === student.id && (
                                            <div className="mt-4 space-y-3">
                                                <div>
                                                    <p className="text-sm font-medium mb-2">Task Completion:</p>
                                                    <div className="space-y-2">
                                                        {tasks.map(task => (
                                                            <div key={task.id} className="flex items-center justify-between bg-white bg-opacity-10 p-2 rounded">
                                                                <span className="text-sm">{task.name}</span>
                                                                <button
                                                                    onClick={() => toggleProgress(student.id, task.id)}
                                                                    className="ml-2"
                                                                >
                                                                    {student.progress[task.id] ? 
                                                                        <CheckCircle size={20} className="text-green-300" /> : 
                                                                        <Circle size={20} className="text-gray-300" />
                                                                    }
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div>
                                                    <p className="text-sm font-medium mb-2 flex items-center gap-1">
                                                        <Star size={14} />
                                                        Collaboration & Behavior Observations:
                                                    </p>
                                                    <div className="space-y-1 max-h-48 overflow-y-auto">
                                                        {getStudentObservationDetails(student.id).map((obs, index) => (
                                                            <div key={index} className="flex items-center justify-between bg-white bg-opacity-10 p-2 rounded text-xs">
                                                                <div>
                                                                    <div className="font-medium">{obs.element}</div>
                                                                    {obs.descriptor && (
                                                                        <div className="text-blue-200">{obs.descriptor}</div>
                                                                    )}
                                                                    <div className="text-blue-200 text-[10px]">in {obs.taskName}</div>
                                                                </div>
                                                                <button
                                                                    onClick={() => toggleStudentObservation(student.id, obs.taskId, obs.elementIndex)}
                                                                    className="ml-2"
                                                                >
                                                                    {obs.completed ? 
                                                                        <CheckCircle size={16} className="text-yellow-300" /> : 
                                                                        <Circle size={16} className="text-gray-300" />
                                                                    }
                                                                </button>
                                                            </div>
                                                        ))}
                                                        {getStudentObservationDetails(student.id).length === 0 && (
                                                            <p className="text-xs text-blue-200 italic">No observation elements defined yet</p>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<TeacherProgressTracker />, document.getElementById('root'));
    </script>

    <script>
        // Register service worker for PWA functionality
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed'));
            });
        }
    </script>
</body>
</html>
