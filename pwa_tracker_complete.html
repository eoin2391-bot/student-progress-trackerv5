<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e40af">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Primary Marks Book</title>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script>
    // ── IndexedDB Helper ─────────────────────────────────────────────────────────
    const DB = {
      db: null,
      init() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open('marksbook', 1);
          req.onupgradeneeded = e => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('photos')) {
              const store = db.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
              store.createIndex('by_teacher_student_subject', ['teacherId', 'studentId', 'subject']);
            }
          };
          req.onsuccess = e => { DB.db = e.target.result; resolve(); };
          req.onerror = e => reject(e);
        });
      },
      savePhoto(record) {
        return new Promise((resolve, reject) => {
          const tx = DB.db.transaction('photos', 'readwrite');
          const req = tx.objectStore('photos').add(record);
          req.onsuccess = e => resolve(e.target.result);
          req.onerror = e => reject(e);
        });
      },
      getPhotos({ teacherId, studentId, subject }) {
        return new Promise((resolve, reject) => {
          const tx = DB.db.transaction('photos', 'readonly');
          const index = tx.objectStore('photos').index('by_teacher_student_subject');
          const req = index.getAll([teacherId, studentId, subject]);
          req.onsuccess = e => resolve(e.target.result);
          req.onerror = e => reject(e);
        });
      },
      deletePhoto(id) {
        return new Promise((resolve, reject) => {
          const tx = DB.db.transaction('photos', 'readwrite');
          const req = tx.objectStore('photos').delete(id);
          req.onsuccess = () => resolve();
          req.onerror = e => reject(e);
        });
      }
    };

    // ── localStorage Helper ──────────────────────────────────────────────────────
    const Store = {
      _get(key) {
        try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
      },
      _set(key, val) { localStorage.setItem(key, JSON.stringify(val)); },
      _key(tid, suffix) { return 'teacher_' + tid + '_' + suffix; },
      getTeachers() { return this._get('teachers') || []; },
      saveTeachers(t) { this._set('teachers', t); },
      getStudents(tid) { return this._get(this._key(tid, 'students')) || []; },
      saveStudents(tid, s) { this._set(this._key(tid, 'students'), s); },
      getMarks(tid) { return this._get(this._key(tid, 'marks')) || {}; },
      saveMarks(tid, m) { this._set(this._key(tid, 'marks'), m); },
      getNotes(tid) { return this._get(this._key(tid, 'notes')) || {}; },
      saveNotes(tid, n) { this._set(this._key(tid, 'notes'), n); },
      getMark(tid, studentId, subject, term) {
        return (this.getMarks(tid)[studentId] || {})[subject]
          ? (this.getMarks(tid)[studentId][subject][term] || '')
          : '';
      },
      setMark(tid, studentId, subject, term, grade) {
        const marks = this.getMarks(tid);
        if (!marks[studentId]) marks[studentId] = {};
        if (!marks[studentId][subject]) marks[studentId][subject] = {};
        marks[studentId][subject][term] = grade;
        this.saveMarks(tid, marks);
      },
      getNote(tid, studentId, subject) {
        return ((this.getNotes(tid)[studentId] || {})[subject]) || '';
      },
      setNote(tid, studentId, subject, text) {
        const notes = this.getNotes(tid);
        if (!notes[studentId]) notes[studentId] = {};
        notes[studentId][subject] = text;
        this.saveNotes(tid, notes);
      },
      removeTeacherData(tid) {
        ['students', 'marks', 'notes'].forEach(k => localStorage.removeItem(this._key(tid, k)));
      }
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Constants ────────────────────────────────────────────────────────────────
    const SUBJECTS = [
      'Writing',
      'Spelling',
      'Reading',
      'Speaking & Listening',
      'Mathematics - Number & Algebra',
      'Measurement & Geometry',
      'Statistics & Probability',
      'Health',
      'HASS',
      'Science',
      'Design & Technology'
    ];

    const TERMS = ['T1', 'T2', 'T3', 'T4'];
    const GRADES = ['A', 'B', 'C', 'D', 'E'];

    const GRADE_STYLE = {
      A:  { bg: 'bg-emerald-500', text: 'text-white',       label: 'Excellent' },
      B:  { bg: 'bg-green-300',   text: 'text-green-900',   label: 'High' },
      C:  { bg: 'bg-yellow-300',  text: 'text-yellow-900',  label: 'Sound' },
      D:  { bg: 'bg-orange-400',  text: 'text-white',       label: 'Limited' },
      E:  { bg: 'bg-red-500',     text: 'text-white',       label: 'Very Limited' },
      '': { bg: 'bg-gray-100',   text: 'text-gray-400',    label: '' }
    };

    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    // ── GradePill (display only) ─────────────────────────────────────────────────
    function GradePill({ grade, size }) {
      const s = GRADE_STYLE[grade || ''];
      const sz = size === 'sm' ? 'w-8 h-8 text-xs'
               : size === 'lg' ? 'w-14 h-14 text-xl'
               : 'w-10 h-10 text-sm';
      return (
        <div className={`${sz} rounded-lg font-bold flex items-center justify-center select-none ${s.bg} ${s.text}`}>
          {grade || '–'}
        </div>
      );
    }

    // ── GradeButton (interactive, cycles on click or accepts keyboard) ────────────
    function GradeButton({ value, onChange }) {
      const opts = ['', ...GRADES];
      const cycle = () => onChange(opts[(opts.indexOf(value || '') + 1) % opts.length]);
      const handleKey = e => {
        const g = e.key.toUpperCase();
        if (GRADES.includes(g)) onChange(g);
        else if (e.key === 'Backspace' || e.key === 'Delete') onChange('');
      };
      const s = GRADE_STYLE[value || ''];
      return (
        <div
          tabIndex={0}
          onClick={cycle}
          onKeyDown={handleKey}
          title="Click to cycle A→B→C→D→E, or type a letter"
          className={`w-10 h-10 rounded-lg font-bold text-sm flex items-center justify-center cursor-pointer
            border-2 border-transparent hover:border-blue-400 focus:outline-none focus:border-blue-500
            transition select-none ${s.bg} ${s.text}`}
        >
          {value || '–'}
        </div>
      );
    }

    // ── LoginScreen ──────────────────────────────────────────────────────────────
    function LoginScreen({ onLogin }) {
      const [teachers, setTeachers] = useState(() => Store.getTeachers());
      const [mode, setMode] = useState('select');
      const [selected, setSelected] = useState(null);
      const [form, setForm] = useState({ name: '', className: '', pin: '', pin2: '' });
      const [pinInput, setPinInput] = useState('');
      const [error, setError] = useState('');

      const setField = (key, raw) => setForm(p => ({ ...p, [key]: raw }));

      function createTeacher() {
        if (!form.name.trim())           return setError('Name is required.');
        if (!/^\d{4}$/.test(form.pin))   return setError('PIN must be exactly 4 digits.');
        if (form.pin !== form.pin2)       return setError('PINs do not match.');
        const t = { id: genId(), name: form.name.trim(), className: form.className.trim(), pin: form.pin };
        const updated = [...teachers, t];
        Store.saveTeachers(updated);
        setTeachers(updated);
        setMode('select');
        setForm({ name: '', className: '', pin: '', pin2: '' });
        setError('');
      }

      function verifyPin() {
        if (pinInput === selected.pin) {
          setPinInput(''); setError('');
          onLogin(selected);
        } else {
          setError('Incorrect PIN. Try again.');
          setPinInput('');
        }
      }

      if (mode === 'pin') return (
        <div className="min-h-screen bg-gradient-to-br from-blue-700 to-indigo-900 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
            <div className="text-center mb-6">
              <div className="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center text-2xl font-bold text-blue-700 mx-auto mb-3">
                {selected.name.charAt(0).toUpperCase()}
              </div>
              <h2 className="text-xl font-bold text-gray-800">{selected.name}</h2>
              {selected.className && <p className="text-gray-500 text-sm">{selected.className}</p>}
            </div>
            <label className="block text-sm font-medium text-gray-700 mb-2 text-center">Enter your 4-digit PIN</label>
            <input
              type="password" maxLength={4} value={pinInput}
              onChange={e => setPinInput(e.target.value.replace(/\D/g, ''))}
              onKeyDown={e => e.key === 'Enter' && verifyPin()}
              className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-center text-3xl tracking-[0.5em] focus:outline-none focus:border-blue-500"
              autoFocus
            />
            {error && <p className="text-red-500 text-sm mt-2 text-center">{error}</p>}
            <button onClick={verifyPin}
              className="mt-4 w-full bg-blue-600 text-white rounded-xl py-3 font-semibold hover:bg-blue-700 transition">
              Unlock
            </button>
            <button onClick={() => { setMode('select'); setError(''); setPinInput(''); }}
              className="mt-3 w-full text-gray-400 hover:text-gray-600 text-sm transition py-1">
              ← Back to profiles
            </button>
          </div>
        </div>
      );

      if (mode === 'create') return (
        <div className="min-h-screen bg-gradient-to-br from-blue-700 to-indigo-900 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
            <h2 className="text-2xl font-bold text-gray-800 mb-6">Create Profile</h2>
            <div className="space-y-4">
              {[
                { label: 'Your name *',        key: 'name',      type: 'text',     placeholder: 'e.g. Ms Smith',          digits: false },
                { label: 'Class / Year level', key: 'className', type: 'text',     placeholder: 'e.g. Year 3B (optional)', digits: false },
                { label: '4-digit PIN *',      key: 'pin',       type: 'password', placeholder: '••••',                   digits: true  },
                { label: 'Confirm PIN *',      key: 'pin2',      type: 'password', placeholder: '••••',                   digits: true  }
              ].map(f => (
                <div key={f.key}>
                  <label className="block text-sm font-medium text-gray-700 mb-1">{f.label}</label>
                  <input
                    type={f.type}
                    maxLength={f.digits ? 4 : undefined}
                    value={form[f.key]}
                    placeholder={f.placeholder}
                    onChange={e => setField(f.key, f.digits ? e.target.value.replace(/\D/g, '') : e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && createTeacher()}
                    className={`w-full border-2 border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:border-blue-500
                      ${f.digits ? 'text-center tracking-widest text-xl' : ''}`}
                  />
                </div>
              ))}
            </div>
            {error && <p className="text-red-500 text-sm mt-3">{error}</p>}
            <button onClick={createTeacher}
              className="mt-5 w-full bg-blue-600 text-white rounded-xl py-3 font-semibold hover:bg-blue-700 transition">
              Create Profile
            </button>
            <button onClick={() => { setMode('select'); setError(''); }}
              className="mt-3 w-full text-gray-400 hover:text-gray-600 text-sm transition py-1">
              ← Back
            </button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-700 to-indigo-900 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
            <div className="text-center mb-8">
              <div className="text-5xl mb-3">📚</div>
              <h1 className="text-3xl font-bold text-gray-800">Primary Marks Book</h1>
              <p className="text-gray-500 mt-1 text-sm">Select your profile to continue</p>
            </div>
            {teachers.length === 0
              ? <p className="text-center text-gray-400 mb-6 py-4">No profiles yet — create one below.</p>
              : (
                <div className="space-y-2 mb-6">
                  {teachers.map(t => (
                    <button key={t.id}
                      onClick={() => { setSelected(t); setMode('pin'); setError(''); setPinInput(''); }}
                      className="w-full flex items-center gap-4 p-4 rounded-xl border-2 border-gray-100 hover:border-blue-400 hover:bg-blue-50 transition text-left group">
                      <div className="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-xl font-bold text-blue-700 flex-shrink-0 group-hover:bg-blue-200 transition">
                        {t.name.charAt(0).toUpperCase()}
                      </div>
                      <div className="min-w-0 flex-1">
                        <div className="font-semibold text-gray-800 truncate">{t.name}</div>
                        {t.className && <div className="text-sm text-gray-500 truncate">{t.className}</div>}
                      </div>
                      <div className="ml-auto text-gray-300 group-hover:text-blue-400 text-xl">›</div>
                    </button>
                  ))}
                </div>
              )
            }
            <button onClick={() => { setMode('create'); setError(''); }}
              className="w-full border-2 border-dashed border-gray-300 rounded-xl py-4 text-gray-500 hover:border-blue-400 hover:text-blue-600 transition font-medium">
              + New Profile
            </button>
          </div>
        </div>
      );
    }

    // ── TopBar ───────────────────────────────────────────────────────────────────
    function TopBar({ teacher, term, setTerm, year, setYear, onLogout }) {
      const cy = new Date().getFullYear();
      const years = [cy - 1, cy, cy + 1].map(String);
      return (
        <div className="bg-blue-700 text-white px-4 py-2.5 flex items-center gap-3 flex-wrap shadow-md z-10">
          <div className="flex-1 min-w-0">
            <div className="font-bold text-base leading-tight truncate">{teacher.name}</div>
            {teacher.className && <div className="text-blue-200 text-xs">{teacher.className}</div>}
          </div>
          <div className="flex items-center gap-2 flex-shrink-0">
            <select value={year} onChange={e => setYear(e.target.value)}
              className="bg-blue-600 border border-blue-400 rounded-lg px-2 py-1 text-sm font-medium focus:outline-none cursor-pointer">
              {years.map(y => <option key={y} value={y}>{y}</option>)}
            </select>
            <div className="flex rounded-lg overflow-hidden border border-blue-400">
              {TERMS.map(t => (
                <button key={t} onClick={() => setTerm(t)}
                  className={`px-2.5 py-1 text-sm font-semibold transition
                    ${term === t ? 'bg-white text-blue-700' : 'hover:bg-blue-600'}`}>
                  {t}
                </button>
              ))}
            </div>
            <button onClick={onLogout} title="Log out"
              className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-blue-600 transition text-blue-200 hover:text-white">
              ✕
            </button>
          </div>
        </div>
      );
    }

    // ── NavBar ───────────────────────────────────────────────────────────────────
    function NavBar({ view, setView }) {
      const tabs = [
        { id: 'class',    label: 'Class View', icon: '📊' },
        { id: 'student',  label: 'Student',    icon: '👤' },
        { id: 'manage',   label: 'Students',   icon: '👥' },
        { id: 'settings', label: 'Settings',   icon: '⚙️' },
      ];
      return (
        <nav className="bg-white border-t border-gray-200 flex z-10 flex-shrink-0">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setView(t.id)}
              className={`flex-1 py-2.5 flex flex-col items-center gap-0.5 text-xs font-medium transition
                border-t-2 -mt-px
                ${view === t.id
                  ? 'text-blue-700 border-blue-700'
                  : 'text-gray-500 hover:text-gray-700 border-transparent'}`}>
              <span className="text-xl leading-none">{t.icon}</span>
              <span>{t.label}</span>
            </button>
          ))}
        </nav>
      );
    }

    // ── ClassView ────────────────────────────────────────────────────────────────
    function ClassView({ teacher, term }) {
      const [subject, setSubject] = useState(SUBJECTS[0]);
      const [, bump] = useState(0);

      const students = Store.getStudents(teacher.id);

      function setGrade(studentId, t, grade) {
        Store.setMark(teacher.id, studentId, subject, t, grade);
        bump(n => n + 1);
      }

      const marks = Store.getMarks(teacher.id);

      return (
        <div className="flex-1 overflow-auto p-4">
          <div className="mb-4">
            <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Subject</label>
            <select value={subject} onChange={e => setSubject(e.target.value)}
              className="w-full border-2 border-gray-200 rounded-xl px-3 py-2.5 text-base font-medium focus:outline-none focus:border-blue-500 bg-white">
              {SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>

          {students.length === 0 ? (
            <div className="text-center py-16 text-gray-400">
              <div className="text-5xl mb-3">👥</div>
              <p className="font-medium text-gray-600">No students yet.</p>
              <p className="text-sm mt-1">Add students in the Students tab.</p>
            </div>
          ) : (
            <>
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="bg-gray-50 border-b border-gray-100">
                      <th className="text-left px-4 py-3 font-semibold text-gray-600 min-w-[140px]">Student</th>
                      {TERMS.map(t => (
                        <th key={t}
                          className={`px-3 py-3 font-semibold text-center min-w-[64px]
                            ${t === term ? 'text-blue-700 bg-blue-50/60' : 'text-gray-500'}`}>
                          {t}
                          {t === term && <span className="ml-1 text-blue-300 text-[10px]">●</span>}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {students.map((s, i) => (
                      <tr key={s.id}
                        className={`border-b border-gray-50 hover:bg-blue-50/30 transition
                          ${i % 2 !== 0 ? 'bg-gray-50/40' : ''}`}>
                        <td className="px-4 py-2.5 font-medium text-gray-800">{s.name}</td>
                        {TERMS.map(t => {
                          const grade = (marks[s.id] || {})[subject]
                            ? ((marks[s.id][subject][t]) || '') : '';
                          return (
                            <td key={t} className={`px-3 py-2 text-center ${t === term ? 'bg-blue-50/30' : ''}`}>
                              <div className="flex justify-center">
                                <GradeButton value={grade} onChange={g => setGrade(s.id, t, g)} />
                              </div>
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div className="mt-4 flex gap-2 flex-wrap">
                {GRADES.map(g => {
                  const gs = GRADE_STYLE[g];
                  return (
                    <div key={g} className={`flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full ${gs.bg} ${gs.text}`}>
                      {g} — {gs.label}
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      );
    }

    // ── PhotoGallery ─────────────────────────────────────────────────────────────
    function PhotoGallery({ teacher, student, subject, term }) {
      const [photos, setPhotos] = useState([]);
      const [lightbox, setLightbox] = useState(null);
      const fileRef = useRef();

      async function load() {
        try {
          const p = await DB.getPhotos({ teacherId: teacher.id, studentId: student.id, subject });
          setPhotos(p);
        } catch { setPhotos([]); }
      }

      useEffect(() => { load(); }, [student.id, subject]);

      async function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async ev => {
          try {
            await DB.savePhoto({
              teacherId: teacher.id,
              studentId: student.id,
              subject,
              term,
              filename: file.name,
              dataURL: ev.target.result,
              timestamp: Date.now()
            });
            await load();
          } catch (err) { console.error('Photo save failed:', err); }
        };
        reader.readAsDataURL(file);
        e.target.value = '';
      }

      async function deletePhoto(id) {
        await DB.deletePhoto(id);
        setLightbox(null);
        await load();
      }

      return (
        <div>
          <div className="flex items-center mb-2">
            <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">
              Work Examples ({photos.length})
            </span>
            <button onClick={() => fileRef.current.click()}
              className="ml-auto text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-medium hover:bg-blue-200 transition">
              📷 Add Photo
            </button>
            <input
              ref={fileRef}
              type="file"
              accept="image/*"
              capture="environment"
              className="hidden"
              onChange={handleFile}
            />
          </div>

          {photos.length > 0 ? (
            <div className="flex gap-2 flex-wrap mt-1">
              {photos.map(p => (
                <img key={p.id} src={p.dataURL} alt={p.filename}
                  className="w-20 h-20 object-cover rounded-xl cursor-pointer border-2 border-gray-200 hover:border-blue-400 transition"
                  onClick={() => setLightbox(p)}
                />
              ))}
            </div>
          ) : (
            <p className="text-xs text-gray-400 italic">
              No photos yet. Tap "Add Photo" to upload or photograph student work.
            </p>
          )}

          {lightbox && (
            <div className="fixed inset-0 bg-black/85 z-50 flex items-center justify-center p-4"
              onClick={() => setLightbox(null)}>
              <div className="relative max-w-2xl w-full" onClick={e => e.stopPropagation()}>
                <img src={lightbox.dataURL} alt={lightbox.filename}
                  className="w-full rounded-2xl shadow-2xl max-h-[70vh] object-contain" />
                <p className="text-white/50 text-xs text-center mt-2">
                  {lightbox.filename} — {new Date(lightbox.timestamp).toLocaleDateString()}
                </p>
                <div className="flex gap-3 mt-3 justify-center">
                  <button onClick={() => deletePhoto(lightbox.id)}
                    className="bg-red-600 text-white px-5 py-2 rounded-xl font-medium hover:bg-red-700 transition text-sm">
                    🗑 Delete
                  </button>
                  <button onClick={() => setLightbox(null)}
                    className="bg-white text-gray-700 px-5 py-2 rounded-xl font-medium hover:bg-gray-100 transition text-sm">
                    Close
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── SubjectCard ──────────────────────────────────────────────────────────────
    function SubjectCard({ teacher, student, subject, term }) {
      const [grade, setGradeState] = useState(() => Store.getMark(teacher.id, student.id, subject, term));
      const [note, setNoteState] = useState(() => Store.getNote(teacher.id, student.id, subject));
      const [expanded, setExpanded] = useState(false);

      useEffect(() => {
        setGradeState(Store.getMark(teacher.id, student.id, subject, term));
        setNoteState(Store.getNote(teacher.id, student.id, subject));
      }, [student.id, subject, term]);

      function changeGrade(g) {
        Store.setMark(teacher.id, student.id, subject, term, g);
        setGradeState(g);
      }

      function changeNote(text) {
        Store.setNote(teacher.id, student.id, subject, text);
        setNoteState(text);
      }

      const s = GRADE_STYLE[grade || ''];
      const hasNote = note.trim().length > 0;

      return (
        <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-gray-50/70 transition select-none"
            onClick={() => setExpanded(e => !e)}>
            <div className="flex-1 min-w-0">
              <div className="font-semibold text-gray-800 text-sm truncate">{subject}</div>
              {hasNote && !expanded && (
                <div className="text-xs text-gray-400 truncate mt-0.5">{note}</div>
              )}
            </div>
            <div className="flex items-center gap-2 flex-shrink-0">
              {hasNote && <span className="text-xs text-blue-400" title="Has notes">📝</span>}
              <GradePill grade={grade} size="sm" />
              <span className="text-gray-300 text-sm">{expanded ? '▲' : '▼'}</span>
            </div>
          </div>

          {expanded && (
            <div className="border-t border-gray-100 px-4 pt-3 pb-4 space-y-4">
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">
                  Grade — {term}
                </label>
                <div className="flex items-center gap-2 flex-wrap">
                  {['', ...GRADES].map(g => {
                    const gs = GRADE_STYLE[g || ''];
                    const active = (grade || '') === g;
                    return (
                      <button key={g} onClick={() => changeGrade(g)}
                        className={`w-10 h-10 rounded-lg font-bold text-sm border-2 transition ${gs.bg} ${gs.text}
                          ${active ? 'border-blue-600 ring-2 ring-blue-300 scale-110' : 'border-transparent hover:scale-105'}`}>
                        {g || '–'}
                      </button>
                    );
                  })}
                  {grade && (
                    <span className={`px-3 py-1 rounded-lg text-xs font-semibold ${s.bg} ${s.text}`}>
                      {s.label}
                    </span>
                  )}
                </div>
              </div>

              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">
                  Notes
                </label>
                <textarea
                  value={note}
                  onChange={e => changeNote(e.target.value)}
                  rows={3}
                  placeholder={`Notes about ${student.name}'s progress in ${subject}…`}
                  className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-500 resize-none transition"
                />
              </div>

              <PhotoGallery teacher={teacher} student={student} subject={subject} term={term} />
            </div>
          )}
        </div>
      );
    }

    // ── StudentView ──────────────────────────────────────────────────────────────
    function StudentView({ teacher, term }) {
      const [students] = useState(() => Store.getStudents(teacher.id));
      const [selected, setSelected] = useState(() => {
        const list = Store.getStudents(teacher.id);
        return list.length > 0 ? list[0] : null;
      });
      const [search, setSearch] = useState('');

      const filtered = students.filter(s =>
        s.name.toLowerCase().includes(search.toLowerCase())
      );

      return (
        <div className="flex flex-1 overflow-hidden min-h-0">
          {/* Student sidebar */}
          <div className="w-44 sm:w-52 border-r border-gray-200 bg-gray-50 flex flex-col flex-shrink-0">
            <div className="p-2 border-b border-gray-200">
              <input
                value={search}
                onChange={e => setSearch(e.target.value)}
                placeholder="Search…"
                className="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:border-blue-400 bg-white"
              />
            </div>
            <div className="flex-1 overflow-y-auto">
              {filtered.map(s => (
                <button key={s.id} onClick={() => setSelected(s)}
                  className={`w-full text-left px-3 py-2.5 text-sm border-b border-gray-100 transition truncate
                    ${selected?.id === s.id
                      ? 'bg-blue-600 text-white font-semibold'
                      : 'hover:bg-white text-gray-700'}`}>
                  {s.name}
                </button>
              ))}
              {filtered.length === 0 && (
                <p className="text-center text-gray-400 text-xs p-4">
                  {students.length === 0 ? 'No students yet.' : 'No match.'}
                </p>
              )}
            </div>
          </div>

          {/* Subject cards */}
          <div className="flex-1 overflow-y-auto p-3 min-w-0">
            {selected ? (
              <div className="space-y-2">
                <div className="px-1 pb-2">
                  <h2 className="text-lg font-bold text-gray-800">{selected.name}</h2>
                  <p className="text-xs text-gray-400">{SUBJECTS.length} subjects · {term}</p>
                </div>
                {SUBJECTS.map(subj => (
                  <SubjectCard
                    key={`${selected.id}-${subj}-${term}`}
                    teacher={teacher}
                    student={selected}
                    subject={subj}
                    term={term}
                  />
                ))}
              </div>
            ) : (
              <div className="h-full flex items-center justify-center text-gray-400">
                <div className="text-center">
                  <div className="text-4xl mb-2">👤</div>
                  <p className="text-sm">{students.length === 0 ? 'Add students in the Students tab' : 'Select a student'}</p>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── StudentManager ────────────────────────────────────────────────────────────
    function StudentManager({ teacher }) {
      const [students, setStudents] = useState(() => Store.getStudents(teacher.id));
      const [newName, setNewName] = useState('');
      const [editing, setEditing] = useState(null);
      const [editName, setEditName] = useState('');
      const [importing, setImporting] = useState(false);
      const [importText, setImportText] = useState('');
      const inputRef = useRef();

      function persist(list) { Store.saveStudents(teacher.id, list); setStudents(list); }

      function add() {
        const name = newName.trim();
        if (!name) return;
        persist([...students, { id: genId(), name }]);
        setNewName('');
        inputRef.current?.focus();
      }

      function remove(id) {
        if (!window.confirm('Remove this student? Their marks and notes remain in storage but will not appear in the class.')) return;
        persist(students.filter(s => s.id !== id));
      }

      function startEdit(s) { setEditing(s.id); setEditName(s.name); }

      function saveEdit(id) {
        const name = editName.trim();
        if (name) persist(students.map(s => s.id === id ? { ...s, name } : s));
        setEditing(null);
      }

      // Parse import textarea: one name per line, skip blanks and duplicates
      const importNames = importText
        .split('\n')
        .map(l => l.trim())
        .filter(l => l.length > 0);
      const existingNames = new Set(students.map(s => s.name.toLowerCase()));
      const newNames  = importNames.filter(n => !existingNames.has(n.toLowerCase()));
      const skipNames = importNames.filter(n =>  existingNames.has(n.toLowerCase()));

      function confirmImport() {
        if (newNames.length === 0) return;
        persist([...students, ...newNames.map(name => ({ id: genId(), name }))]);
        setImporting(false);
        setImportText('');
      }

      return (
        <div className="flex-1 overflow-auto p-4">
          <div className="max-w-lg mx-auto">
            <h2 className="text-xl font-bold text-gray-800 mb-4">Manage Students</h2>

            {/* Single add + Import button row */}
            <div className="flex gap-2 mb-3">
              <input
                ref={inputRef}
                value={newName}
                onChange={e => setNewName(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && add()}
                placeholder="Student name"
                className="flex-1 border-2 border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:border-blue-500"
              />
              <button onClick={add}
                className="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-semibold hover:bg-blue-700 transition">
                Add
              </button>
            </div>
            <button onClick={() => { setImporting(true); setImportText(''); }}
              className="w-full mb-6 border-2 border-dashed border-blue-200 rounded-xl py-2.5 text-blue-600 hover:border-blue-400 hover:bg-blue-50 transition font-medium text-sm flex items-center justify-center gap-2">
              ⬆ Import Multiple Students
            </button>

            <div className="space-y-2">
              {students.map(s => (
                <div key={s.id} className="bg-white rounded-xl border border-gray-100 shadow-sm px-4 py-3 flex items-center gap-3">
                  <div className="w-9 h-9 rounded-full bg-blue-100 flex items-center justify-center font-bold text-blue-700 text-sm flex-shrink-0">
                    {s.name.charAt(0).toUpperCase()}
                  </div>
                  {editing === s.id ? (
                    <>
                      <input
                        value={editName}
                        onChange={e => setEditName(e.target.value)}
                        autoFocus
                        onKeyDown={e => e.key === 'Enter' ? saveEdit(s.id) : e.key === 'Escape' && setEditing(null)}
                        className="flex-1 border-2 border-blue-400 rounded-lg px-2 py-1 focus:outline-none text-sm"
                      />
                      <button onClick={() => saveEdit(s.id)} className="text-green-600 hover:text-green-700 font-bold text-xl px-1">✓</button>
                      <button onClick={() => setEditing(null)} className="text-gray-400 hover:text-gray-600 text-xl px-1">✕</button>
                    </>
                  ) : (
                    <>
                      <span className="flex-1 font-medium text-gray-800 text-sm">{s.name}</span>
                      <button onClick={() => startEdit(s)} title="Rename"
                        className="text-gray-300 hover:text-blue-500 transition text-xl px-1">✎</button>
                      <button onClick={() => remove(s.id)} title="Remove"
                        className="text-gray-300 hover:text-red-500 transition text-xl px-1">🗑</button>
                    </>
                  )}
                </div>
              ))}
              {students.length === 0 && (
                <p className="text-center text-gray-400 py-10 text-sm">No students yet. Add one above.</p>
              )}
            </div>

            {students.length > 0 && (
              <p className="text-center text-gray-400 text-sm mt-5">
                {students.length} student{students.length !== 1 ? 's' : ''}
              </p>
            )}
          </div>

          {/* Import modal */}
          {importing && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
              onClick={() => setImporting(false)}>
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6"
                onClick={e => e.stopPropagation()}>
                <h3 className="text-lg font-bold text-gray-800 mb-1">Import Students</h3>
                <p className="text-sm text-gray-500 mb-4">
                  Paste one student name per line. Duplicates are skipped automatically.
                </p>
                <textarea
                  value={importText}
                  onChange={e => setImportText(e.target.value)}
                  rows={10}
                  autoFocus
                  placeholder={"Alice Smith\nBob Jones\nCarol Williams\n…"}
                  className="w-full border-2 border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-blue-500 resize-none font-mono"
                />

                {/* Preview counts */}
                {importNames.length > 0 && (
                  <div className="mt-3 space-y-1">
                    {newNames.length > 0 && (
                      <p className="text-sm text-emerald-700 font-medium">
                        ✓ {newNames.length} student{newNames.length !== 1 ? 's' : ''} will be added
                      </p>
                    )}
                    {skipNames.length > 0 && (
                      <p className="text-sm text-gray-400">
                        ⊘ {skipNames.length} already exist and will be skipped
                      </p>
                    )}
                    {newNames.length === 0 && (
                      <p className="text-sm text-orange-500">All names already exist in the class.</p>
                    )}
                  </div>
                )}

                <div className="flex gap-3 mt-5">
                  <button onClick={() => setImporting(false)}
                    className="flex-1 border-2 border-gray-200 rounded-xl py-2.5 font-semibold text-gray-600 hover:bg-gray-50 transition">
                    Cancel
                  </button>
                  <button
                    onClick={confirmImport}
                    disabled={newNames.length === 0}
                    className="flex-1 bg-blue-600 text-white rounded-xl py-2.5 font-semibold hover:bg-blue-700 transition disabled:opacity-40 disabled:cursor-not-allowed">
                    Add {newNames.length > 0 ? newNames.length : ''} Student{newNames.length !== 1 ? 's' : ''}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Settings ─────────────────────────────────────────────────────────────────
    function Settings({ teacher, onLogout }) {
      const [pin, setPin] = useState('');
      const [pin2, setPin2] = useState('');
      const [msg, setMsg] = useState({ text: '', ok: false });

      function changePin() {
        if (!/^\d{4}$/.test(pin)) return setMsg({ text: 'PIN must be exactly 4 digits.', ok: false });
        if (pin !== pin2)          return setMsg({ text: 'PINs do not match.', ok: false });
        const teachers = Store.getTeachers().map(t => t.id === teacher.id ? { ...t, pin } : t);
        Store.saveTeachers(teachers);
        teacher.pin = pin;
        setPin(''); setPin2('');
        setMsg({ text: 'PIN updated successfully!', ok: true });
      }

      function exportData() {
        const data = {
          teacher: { name: teacher.name, className: teacher.className },
          students: Store.getStudents(teacher.id),
          marks: Store.getMarks(teacher.id),
          notes: Store.getNotes(teacher.id),
          exported: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'marksbook_' + teacher.name.replace(/\s+/g, '_') + '_' + new Date().toISOString().slice(0, 10) + '.json';
        a.click();
        URL.revokeObjectURL(url);
      }

      function deleteProfile() {
        if (!window.confirm('Permanently delete your profile and ALL data (marks, notes)?\n\nThis cannot be undone.')) return;
        const teachers = Store.getTeachers().filter(t => t.id !== teacher.id);
        Store.saveTeachers(teachers);
        Store.removeTeacherData(teacher.id);
        onLogout();
      }

      return (
        <div className="flex-1 overflow-auto p-4">
          <div className="max-w-lg mx-auto space-y-4">
            <h2 className="text-xl font-bold text-gray-800">Settings</h2>

            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
              <h3 className="font-semibold text-gray-700 mb-2">Profile</h3>
              <p className="text-sm font-medium text-gray-800">{teacher.name}</p>
              {teacher.className && <p className="text-sm text-gray-500">{teacher.className}</p>}
            </div>

            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
              <h3 className="font-semibold text-gray-700 mb-3">Change PIN</h3>
              <div className="space-y-3">
                {[
                  { label: 'New PIN',     val: pin,  set: setPin  },
                  { label: 'Confirm PIN', val: pin2, set: setPin2 }
                ].map(f => (
                  <div key={f.label}>
                    <label className="block text-sm text-gray-600 mb-1">{f.label}</label>
                    <input
                      type="password" maxLength={4} value={f.val}
                      onChange={e => f.set(e.target.value.replace(/\D/g, ''))}
                      onKeyDown={e => e.key === 'Enter' && changePin()}
                      className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 focus:outline-none focus:border-blue-500 tracking-widest text-center text-xl"
                    />
                  </div>
                ))}
                {msg.text && (
                  <p className={`text-sm ${msg.ok ? 'text-emerald-600' : 'text-red-500'}`}>{msg.text}</p>
                )}
                <button onClick={changePin}
                  className="w-full bg-blue-600 text-white rounded-xl py-2.5 font-semibold hover:bg-blue-700 transition">
                  Update PIN
                </button>
              </div>
            </div>

            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
              <h3 className="font-semibold text-gray-700 mb-1">Export Data</h3>
              <p className="text-xs text-gray-400 mb-3">Downloads all marks and notes as a JSON file. Photos are stored locally and not included.</p>
              <button onClick={exportData}
                className="w-full bg-emerald-600 text-white rounded-xl py-2.5 font-semibold hover:bg-emerald-700 transition">
                ⬇ Export Marks (JSON)
              </button>
            </div>

            <div className="bg-white rounded-2xl border border-red-100 shadow-sm p-5">
              <h3 className="font-semibold text-red-700 mb-1">Danger Zone</h3>
              <p className="text-xs text-gray-400 mb-3">Permanently deletes your teacher profile and all marks and notes data.</p>
              <button onClick={deleteProfile}
                className="w-full bg-red-600 text-white rounded-xl py-2.5 font-semibold hover:bg-red-700 transition">
                Delete Profile &amp; All Data
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── MainApp ──────────────────────────────────────────────────────────────────
    function MainApp({ teacher, onLogout }) {
      const [view, setView] = useState('class');
      const [term, setTerm] = useState('T1');
      const [year, setYear] = useState(String(new Date().getFullYear()));

      return (
        <div className="flex flex-col h-screen overflow-hidden">
          <TopBar teacher={teacher} term={term} setTerm={setTerm} year={year} setYear={setYear} onLogout={onLogout} />
          <div className="flex-1 overflow-hidden flex flex-col min-h-0">
            {view === 'class'    && <ClassView      teacher={teacher} term={term} year={year} />}
            {view === 'student'  && <StudentView    teacher={teacher} term={term} year={year} />}
            {view === 'manage'   && <StudentManager teacher={teacher} />}
            {view === 'settings' && <Settings       teacher={teacher} onLogout={onLogout} />}
          </div>
          <NavBar view={view} setView={setView} />
        </div>
      );
    }

    // ── App (root) ────────────────────────────────────────────────────────────────
    function App() {
      const [ready, setReady] = useState(false);
      const [teacher, setTeacher] = useState(null);

      useEffect(() => {
        DB.init()
          .then(() => setReady(true))
          .catch(err => { console.warn('IndexedDB unavailable, photo storage disabled:', err); setReady(true); });

        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('sw.js').catch(() => {});
        }
      }, []);

      if (!ready) return (
        <div className="min-h-screen flex items-center justify-center text-gray-400">
          <div className="text-center">
            <div className="text-5xl mb-3">📚</div>
            <p>Loading…</p>
          </div>
        </div>
      );

      if (!teacher) return <LoginScreen onLogin={setTeacher} />;
      return <MainApp teacher={teacher} onLogout={() => setTeacher(null)} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
